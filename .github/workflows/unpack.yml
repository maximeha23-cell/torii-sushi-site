name: Import project source

on:
  push:
    paths:
      - "torii-sushi-site-source.zip"
      - ".github/workflows/unpack.yml"

permissions:
  contents: write

jobs:
  import-source:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Extract project
        run: |
          unzip -o torii-sushi-site-source.zip
          rm -f torii-sushi-site-source.zip
          rm -f .github/workflows/unpack.yml
      - name: Commit extracted source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import Torii Sushi website source"
          git push
